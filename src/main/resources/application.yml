quarkus:
  application:
    name: Gestion de Medicamentos
    version: 1.0-SNAPSHOT
  http:
    port: 8620
    host: localhost
    root-path: kick
    cors:
      ~: true
      origins: "http://localhost:4200"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Content-Type,Authorization,X-Requested-With


  # Base de datos
  datasource:
    db-kind: h2
    username: admin
    password: 12345
    jdbc:
      #url: "jdbc:h2:mem:gdocente"
      file: ./data/gdocentes_db

  # Hibernate-hibernate-orm:
  hibernate-orm:
    schema-management:
      strategy:
        drop-and-create
    log:
      sql: true


  # Configuracion de Logs
  log:
    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      dark-launch: true

    file:
      enabled: true
      path: logs/gestudiantes.log
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      rotation:
        max-file-size: 5M # Tamaño máximo
        max-backup-index: 5 # Archivos conservados
        file-suffix: yyyy-MM-dd #Sufijo de retación

  swagger-ui:
    enabled: true
    always-include: true
    path: "/swager-ui"
    title: "Gestion de medicamentos"
    description: "API generado en Quarkus para gestion de medicamentos"
    version: "V1"
    contact-name: "..."

mp:
  openapi:
    extensions:
      smallrye:
        info:
          title: "Gestion de medicamentos"
          version: "1.1.0"
